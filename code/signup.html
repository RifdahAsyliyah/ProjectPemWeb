<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Pesona NTB</title>
    <link rel="stylesheet" href="styleLandingPage.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- NAVIGASI SAMA PERSIS DENGAN INDEX -->
    <nav>
        <div class="logo">Pesona NTB</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#destinations">Destinations</a></li>
        </ul>
        <div class="auth-buttons">
            <a href="signin.html" class="sign-in">Sign In</a>
            <a href="signup.html" class="sign-up active-auth">Sign Up</a>
        </div>
    </nav>

    <!-- SIGN UP SECTION -->
    <section class="signup-section">
        <div class="signup-container">
            <div class="signup-card">
                <div class="signup-header">
                    <h1>Sign Up</h1>
                    <p>Daftar akun gratis dan jelajahi pesona NTB.</p>
                </div>

                <form action="signup_process.php" method="POST" id="signupForm">
                    <div class="input-group">
                        <label for="nama">Nama Lengkap</label>
                        <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="contoh: email@domain.com" required>
                    </div>

                    <div class="input-group">
                        <label for="telp">Nomor Telepon</label>
                        <input type="tel" id="telp" name="telp" placeholder="+62 atau 08..." required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Minimal 6 karakter" required>
                    </div>

                    <div class="input-group">
                        <label for="confirm_password">Konfirmasi Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Ketik ulang password" required>
                    </div>

                    <button type="submit" class="signup-btn">Sign Up →</button>
                </form>

                <div class="signup-footer">
                    <p>Sudah punya akun? <a href="signin.html">Sign In</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER SAMA PERSIS DENGAN INDEX -->
    <footer>
        <div class="footer-content">
            <div class="footer-logo">Pesona NTB</div>
            <p>© 2026 Pesona NTB — Discover the wonders of Nusa Tenggara Barat</p>
        </div>
    </footer>

    <script src="scriptSignup.js"></script>
</body>
</html>
