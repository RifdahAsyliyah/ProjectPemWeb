<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Pesona NTB</title>
    <link rel="stylesheet" href="styleLandingPage.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- NAVIGASI SAMA PERSIS DENGAN INDEX -->
    <nav>
        <div class="logo">Pesona NTB</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#destinations">Destinations</a></li>
        </ul>
        <div class="auth-buttons">
            <a href="signin.html" class="sign-in active-auth">Sign In</a>
            <a href="signup.html" class="sign-up">Sign Up</a>
        </div>
    </nav>

    <!-- SIGN IN SECTION (MIRIP HERO TAPI FORM) -->
    <section class="signin-section">
        <div class="signin-container">
            <div class="signin-card">
                <div class="signin-header">
                    <h1>Sign In</h1>
                    <p>Selamat datang kembali! Masuk ke akun Pesona NTB-mu.</p>
                </div>

                <form action="signin_process.php" method="POST" id="signinForm">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="contoh: email@domain.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                    </div>

                    <div class="auth-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember"> Ingat saya
                        </label>
                        <a href="#" class="forgot-password">Lupa password?</a>
                    </div>

                    <button type="submit" class="signin-btn">Sign In →</button>
                </form>

                <div class="signin-footer">
                    <p>Belum punya akun? <a href="signup.html">Sign Up</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER SAMA PERSIS DENGAN INDEX -->
    <footer>
        <div class="footer-content">
            <div class="footer-logo">Pesona NTB</div>
            <p>© 2026 Pesona NTB — Discover the wonders of Nusa Tenggara Barat</p>
        </div>
    </footer>

    <script src="scriptSignin.js"></script>
</body>
</html>
