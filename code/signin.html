<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Pesona NTB</title>

    <link rel="stylesheet" href="styleAuth.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <div class="logo">Pesona NTB</div>
</nav>

<div class="auth-container">

    <div class="auth-card">
        <h2>Selamat Datang</h2>
        <p>Masuk untuk melanjutkan perjalananmu</p>

        <form action="login.php" method="POST">
            <input type="email" name="email" placeholder="Email" required>

            <div class="password-group">
                <input type="password" name="password" placeholder="Password" required>

                <div class="forgot-password">
                    <a href="forgot-password.html">Forgot password?</a>
                </div>
            </div>

            <button type="submit">Sign In</button>
        </form>

        <p class="switch">
            Belum punya akun? <a href="signup.html">Sign Up</a>
        </p>
    </div>

</div>

</body>
</html>
