<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Pesona NTB</title>

    <link rel="stylesheet" href="../style/styleAuth.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <div class="logo">Pesona NTB</div>
</nav>

<div class="auth-container">

    <div class="auth-card">
        <h2>Lupa Password?</h2>
        <p>Masukkan email kamu, kami akan kirim link reset password</p>

        <form onsubmit="kirimEmail(event)">
            <input type="email" id="email" placeholder="Masukkan email" required>

            <button type="submit">Kirim Link Reset</button>
        </form>

        <p class="switch">
            Kembali ke <a href="signin.html">Sign In</a>
        </p>

        <p id="notif" style="margin-top:15px; font-size:0.85rem;"></p>
    </div>

</div>

<script>
function kirimEmail(event){
    event.preventDefault();

    const email = document.getElementById("email").value;
    const notif = document.getElementById("notif");

    notif.style.color = "green";
    notif.innerHTML = "Link reset password telah dikirim ke <b>" + email + "</b> (simulasi)";
}
</script>

</body>
</html>
