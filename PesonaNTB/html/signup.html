<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Pesona NTB</title>

    <link rel="stylesheet" href="../style/styleAuth.css">

    <!-- FONT SAMA -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <div class="logo">Pesona NTB</div>
</nav>
    <div class="back-home">
        <a href="../index.html">Back to Home</a>
    </div>


<div class="auth-container">

    <div class="auth-card">
        <h2>Buat Akun</h2>
        <p>Mulai jelajahi keindahan NTB</p>

        <form action="../config/signup.php" method="POST">
            <input type="text" name="nama" placeholder="Nama lengkap" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="telp" placeholder="No. Telepon" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Sign Up</button>
        </form>

        <p class="switch">
            Sudah punya akun? <a href="signin.html">Sign In</a>
        </p>
    </div>

</div>

<script src="../script/scriptSignUp.js"></script>
</body>
</html>
